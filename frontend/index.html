<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      CSP 刻意不在此以 meta tag 設定。瀏覽器對多重 CSP 來源採「疊加取交集」,
      HTTP Response Header 與 meta tag 的 CSP 會同時生效、缺一不可放行,並非
      後者覆蓋前者。若在這裡放開發用的 connect-src(僅允許 localhost),即使
      正式環境另外用 Response Header 設定了正確的後端網域,瀏覽器仍會因為
      meta tag 這邊不允許而擋下所有正式環境的 API 請求。
      CSP 一律由部署平台(Render Static Site 的「Response Headers」設定)
      集中管理,開發環境不需要 CSP 限制。
    -->
    <title>學生出缺勤系統</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
